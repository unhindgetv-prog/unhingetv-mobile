name: EAS Build

# On-demand cloud builds via EAS, authenticated with the EXPO_TOKEN robot secret.
# Manual trigger only — nothing builds automatically on push, so EAS build quota is
# never consumed by surprise. Trigger from the Actions tab ("Run workflow") or with:
#   gh workflow run eas-build.yml -f platform=all -f profile=production
#
# `--no-wait` queues the build on Expo's servers and exits immediately, so each run
# uses only a couple minutes of GitHub Actions time regardless of build length.
# iOS/Android signing credentials are read from EAS remote credentials.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform(s) to build"
        type: choice
        default: all
        options: [all, android, ios]
      profile:
        description: "EAS profile (see eas.json). apple-tv = iOS only; android-tv/fire-tv = Android only."
        type: choice
        default: production
        options: [production, preview, development, apple-tv, android-tv, fire-tv]

jobs:
  build:
    name: "queue ${{ inputs.platform }} / ${{ inputs.profile }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci --no-audit --prefer-offline
      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Queue EAS build
        run: eas build --platform "${{ inputs.platform }}" --profile "${{ inputs.profile }}" --non-interactive --no-wait
